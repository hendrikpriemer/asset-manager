services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

  # --- AAS prototype (step 1 of the AAS integration) ---
  # Local Eclipse BaSyx AAS Environment: bundles the AAS Repository, Submodel
  # Repository, and ConceptDescription Repository in a single component, so
  # we have something to create/fetch a test AAS against. Registry/Discovery
  # are intentionally omitted for now - we only need a direct endpoint URL to
  # reference from an Asset, not cross-system lookup yet.
  basyx-mongo:
    image: mongo:8
    environment:
      MONGO_INITDB_ROOT_USERNAME: basyxMongoAdmin
      MONGO_INITDB_ROOT_PASSWORD: basyxMongoPassword
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username \"$$MONGO_INITDB_ROOT_USERNAME\" --password \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 })\" || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10
    volumes:
      - basyx-mongo-data:/data/db

  basyx-aas-env:
    image: eclipsebasyx/aas-environment:2.0.0-milestone-13
    environment:
      MONGO_INITDB_ROOT_USERNAME: basyxMongoAdmin
      MONGO_INITDB_ROOT_PASSWORD: basyxMongoPassword
    volumes:
      - ./basyx/aas-env.properties:/application/application.properties
    ports:
      - "8081:8081"
    depends_on:
      basyx-mongo:
        condition: service_healthy

volumes:
  pgdata:
  basyx-mongo-data:
